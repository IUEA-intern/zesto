<script src="script/restaurant.js"></script>
<script>
  (function(){
    try {
      var params = new URLSearchParams(window.location.search);
      var q = params.get('q') || '';
      var input = document.querySelector('.hero-search input[name="q"]');
      if (input) input.value = q;
      var restosTitle = document.getElementById('restosTitle');
      var restosSub = document.getElementById('restosSub');
      if (restosTitle) restosTitle.textContent = q ? 'Showing results for "' + q + '"' : 'Top restaurants near you';
      if (restosSub) restosSub.textContent = q ? 'Search results based on your query.' : 'Most ordered today in your area';
    } catch (e) {
      console.warn('Search query init error', e);
    }
  })();

  document.addEventListener('click', function(event) {
    var dropdown = event.target.closest('.filter-dropdown');
    if (!dropdown) {
      document.querySelectorAll('.filter-dropdown.open').forEach(function(item) {
        item.classList.remove('open');
      });
      return;
    }

    var button = event.target.closest('.filter-button');
    if (button) {
      var hasMenu = button.nextElementSibling && button.nextElementSibling.classList.contains('filter-menu');
      if (hasMenu) {
        event.preventDefault();
        event.stopPropagation();
        document.querySelectorAll('.filter-dropdown.open').forEach(function(item) {
          if (item !== dropdown) item.classList.remove('open');
        });
        dropdown.classList.toggle('open');
        return;
      }
      button.classList.toggle('active');
      return;
    }

    var menuItem = event.target.closest('.filter-menu-item');
    if (menuItem) {
      event.preventDefault();
      event.stopPropagation();
      menuItem.classList.toggle('active');
    }
  });

  var resetButton = document.querySelector('.hero-reset');
  if (resetButton) {
    resetButton.addEventListener('click', function() {
      document.querySelectorAll('.filter-button.active, .filter-menu-item.active').forEach(function(item) {
        item.classList.remove('active');
      });
      document.querySelectorAll('.filter-dropdown.open').forEach(function(item) {
        item.classList.remove('open');
      });
    });
  }
</script>
