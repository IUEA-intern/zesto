<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml"
href='data:image/svg+xml,
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
    
    <!-- Background -->
    <circle cx="32" cy="32" r="30" fill="%23FF6200"/>

    <!-- Lightning Z -->
    <path d="M40 10
             L22 30
             H33
             L24 54
             L44 30
             H33
             Z"
          fill="white"/>
          
</svg>'>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Knewave&family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" type="text/css" href="css/restaurant.css">
  <style>
    .search-hero{
      position:relative;
      overflow:visible;
      background:linear-gradient(rgba(250,250,247,0.26), rgba(250,250,247,0.26));
    }
    .search-hero::before{
      content:"";
      position:absolute;
      inset:0;
      background-image:url('images/search-bg.jpeg');
      background-size:cover;
      background-position:center center;
      opacity:0.85;
      z-index:0;
      pointer-events:none;
      filter:contrast(1.06) saturate(1.05);
    }
    .search-hero::after{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(rgba(250,250,247,0.66), rgba(250,250,247,1));
      z-index:0;
      pointer-events:none;
    }
    .search-hero .container, .search-hero .hero-inner, .search-hero .hero-left, .search-hero .hero-right{position:relative;z-index:1}
    .search-hero .hero-inner{grid-template-columns:1fr 360px;gap:32px;}
    .search-hero .hero-h1{max-width:650px;font-size:clamp(22px,3vw,38px);line-height:1.2;}
  </style>
    <title>Zesto — Search & Restaurants</title>
    <link rel="stylesheet" href="css/auth-modal.css">
    <link rel="stylesheet" href="css/user-menu.css">
</head>
<body>
    

<!-- ── NAV (match order page structure, no cart) ── -->
<nav class="navbar" id="mainNav">
  <div class="nav-inner">
    <a href="index.html" class="nav-brand">
      <span class="brand-logo">Zes<span class="brand-accent">to</span></span>
    </a>

    <div class="nav-actions">
      <div id="userPill" class="user-pill hidden"></div>

      <button id="openAuthModal" class="btn-auth" onclick="window.SharedAuth?.showLogin?.()">Login / Sign Up</button>
     
    </div>
  </div>
</nav>
<!-- ── RESTAURANTS SECTION ── -->
<section class="restos-section">
  <div class="container">
    <!-- Skeleton shown while loading -->
    <div class="restos-grid" id="restos-skeleton" aria-hidden="true">
      <div class="r-card r-skeleton"></div>
      <div class="r-card r-skeleton"></div>
      <div class="r-card r-skeleton"></div>
    </div>
    <!-- Cards injected here by JS -->
    <div class="restos-grid" id="restos-grid" style="display:none;"></div>
  </div>
</section>

<script src="script/restaurant.js"></script>
<script>
  (function(){
    try {
      var params = new URLSearchParams(window.location.search);
      var q = params.get('q') || '';
      var input = document.querySelector('.hero-search input[name="q"]');
      if (input) input.value = q;
      var restosTitle = document.getElementById('restosTitle');
      var restosSub = document.getElementById('restosSub');
      if (restosTitle) restosTitle.textContent = q ? 'Showing results for "' + q + '"' : 'Top restaurants near you';
      if (restosSub) restosSub.textContent = q ? 'Search results based on your query.' : 'Most ordered today in your area';
    } catch (e) {
      console.warn('Search query init error', e);
    }
  })();

  document.addEventListener('click', function(event) {
    var dropdown = event.target.closest('.filter-dropdown');
    if (!dropdown) {
      document.querySelectorAll('.filter-dropdown.open').forEach(function(item) {
        item.classList.remove('open');
      });
      return;
    }

    var button = event.target.closest('.filter-button');
    if (button) {
      var hasMenu = button.nextElementSibling && button.nextElementSibling.classList.contains('filter-menu');
      if (hasMenu) {
        event.preventDefault();
        event.stopPropagation();
        document.querySelectorAll('.filter-dropdown.open').forEach(function(item) {
          if (item !== dropdown) item.classList.remove('open');
        });
        dropdown.classList.toggle('open');
        return;
      }
      button.classList.toggle('active');
      return;
    }

    var menuItem = event.target.closest('.filter-menu-item');
    if (menuItem) {
      event.preventDefault();
      event.stopPropagation();
      menuItem.classList.toggle('active');
    }
  });

  var resetButton = document.querySelector('.hero-reset');
  if (resetButton) {
    resetButton.addEventListener('click', function() {
      document.querySelectorAll('.filter-button.active, .filter-menu-item.active').forEach(function(item) {
        item.classList.remove('active');
      });
      document.querySelectorAll('.filter-dropdown.open').forEach(function(item) {
        item.classList.remove('open');
      });
    });
  }
</script>
<script src="script/shared_auth.js"></script>
<script src="script/user-menu.js"></script>
<script src="script/nav-auth.js"></script>
</body>
</html>
