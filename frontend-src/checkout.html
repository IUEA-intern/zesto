<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zesto — Checkout</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Knewave&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet" />

    <link rel="stylesheet" href="css/checkout.css">
</head>

<body>

    <header class="nav">
        <div class="container">
            <div class="nav-inner">

                <div class="nav-left">
                    <a href="cart.html" class="back-btn">←</a>

                    <div class="logo">
                        <div class="logo-mark">⚡</div>
                        <div class="logo-text">
                            Zes<span>to</span>
                        </div>
                    </div>
                </div>

                <div class="nav-right">
                    <div class="location-pill">
                        📍 Kampala, Uganda
                    </div>

                    <div class="cart-nav-btn">
                        🛒 <span id="navCartCount">0</span>
                    </div>

                    <button class="profile-btn">AK</button>
                </div>

            </div>
        </div>
    </header>

    <div class="container">

        <h1 class="page-title">Checkout</h1>

        <div class="checkout-layout">

            <section class="checkout-form-box">

                <h2>Delivery Details</h2>

                <form id="checkoutForm">

                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="fullName" required>
                    </div>

                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="email" required>
                    </div>

                    <div class="form-group">
                        <label>Phone Number</label>
                        <input type="tel" id="phone" required>
                    </div>

                    <div class="form-group">
                        <label>Delivery Address</label>
                        <textarea id="address" rows="4" required></textarea>
                    </div>

                    <div class="form-group">
                        <label>Additional Notes</label>
                        <textarea id="notes" rows="3"></textarea>
                    </div>

                </form>

            </section>

            <aside class="summary-box">

                <div class="summary-title">
                    Order Summary
                </div>

                <div id="orderItems"></div>

                <div class="summary-row">
                    <span>Subtotal</span>
                    <span id="subtotal">UGX 0</span>
                </div>

                <div class="summary-row">
                    <span>Delivery</span>
                    <span>UGX 5,000</span>
                </div>

                <div class="summary-row total">
                    <span>Total</span>
                    <span id="total">UGX 5,000</span>
                </div>

                <button id="placeOrderBtn" class="place-order-btn" disabled>
                    Place Order
                </button>

            </aside>

        </div>

    </div>

    <script src="script/checkout.js"></script>

</body>

</html>
